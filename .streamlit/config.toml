[theme]
primaryColor = "#1f77b4"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f8f9fa"
textColor = "#262730"
font = "sans serif"
base = "light"

[client]
showErrorDetails = true
toolbarMode = "minimal"

[logger]
level = "info"

[browser]
gatherUsageStats = false

[server]
maxUploadSize = 200
enableXsrfProtection = true
headless = true
port = 8501

[runner]
magicEnabled = true
